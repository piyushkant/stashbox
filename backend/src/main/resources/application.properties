spring.application.name=stashbox
server.port=8080

# --- Database (local Postgres running in Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/stashbox
spring.datasource.username=stashbox
spring.datasource.password=stashbox

# Let Hibernate create/update tables from the entities automatically.
# Fine for local dev; in production you'd use migrations (Flyway/Liquibase) instead.
spring.jpa.hibernate.ddl-auto=update

# Log the SQL Hibernate runs, so you can see what's happening while learning.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
